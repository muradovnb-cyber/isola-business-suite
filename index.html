<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ИСОЛА Мебель — Структура компании</title>
  <!-- Подключение премиального шрифта -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0c0d0f;
      --panel-bg: #15171c; /* Отключен blur во вьюпорте для высокой производительности */
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8f9fa;
      --text-muted: #8c96a3;
      
      /* Цветовые схемы по департаментам */
      --color-dir: #e2c044;
      --color-dir-glow: rgba(226, 192, 68, 0.15);
      
      --color-sales: #2ec4b6;
      --color-sales-glow: rgba(46, 196, 182, 0.15);
      
      --color-prod: #4361ee;
      --color-prod-glow: rgba(67, 97, 238, 0.15);
      
      --color-team: #f77f00;
      --color-team-glow: rgba(247, 127, 0, 0.15);
      
      --color-support: #b583ff;
      --color-support-glow: rgba(181, 131, 255, 0.15);
      
      --font-title: 'Outfit', 'Montserrat', sans-serif;
      --font-body: 'Montserrat', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
    }

    /* Стилизация скроллбара */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* Индикатор режима редактирования */
    body.edit-active::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: 4px solid #ffbf00;
      pointer-events: none;
      z-index: 999;
      box-shadow: inset 0 0 20px rgba(255, 191, 0, 0.1);
      animation: pulseBorder 2s infinite alternate;
    }

    @keyframes pulseBorder {
      0% { border-color: rgba(255, 191, 0, 0.3); }
      100% { border-color: rgba(255, 191, 0, 0.8); }
    }

    /* Фоновое свечение (Ambient Glow) - Оптимизированные статические фоны */
    .ambient-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .ambient-glow {
      position: absolute;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.08;
    }
    .glow-1 {
      background: radial-gradient(circle, var(--color-dir), transparent);
      top: -20%;
      left: 10%;
    }
    .glow-2 {
      background: radial-gradient(circle, var(--color-prod), transparent);
      bottom: -15%;
      right: 10%;
    }
    .glow-3 {
      background: radial-gradient(circle, var(--color-sales), transparent);
      top: 40%;
      left: 40%;
    }

    /* Панель интерфейса (Шапка и фильтры) */
    header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px 40px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(12, 13, 15, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .logo-container h1 {
      font-family: var(--font-title);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(45deg, #fff, #a3aab2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-container h1 span {
      color: var(--color-dir);
      -webkit-text-fill-color: initial;
    }

    .logo-container p {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .controls-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* Переключатель вида (Дерево / Карта) */
    .view-switch-control {
      display: flex;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3px;
    }
    .view-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 17px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .view-btn.active {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* Кнопка режима редактирования */
    .edit-mode-btn {
      background: rgba(255, 191, 0, 0.08);
      border: 1px solid rgba(255, 191, 0, 0.3);
      border-radius: 20px;
      padding: 8px 16px;
      color: #ffbf00;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      transition: all 0.2s ease;
    }
    .edit-mode-btn:hover {
      background: rgba(255, 191, 0, 0.2);
      border-color: rgba(255, 191, 0, 0.5);
    }
    .edit-mode-btn.active {
      background: #ffbf00;
      color: #000;
      border-color: #ffbf00;
      box-shadow: 0 0 15px rgba(255, 191, 0, 0.3);
    }

    /* Поле поиска */
    .search-box {
      position: relative;
    }
    .search-box input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 10px 20px 10px 40px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 13px;
      width: 180px;
      transition: all 0.2s ease;
    }
    .search-box input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.07);
      width: 230px;
    }
    .search-box svg {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      fill: var(--text-muted);
      pointer-events: none;
      width: 16px;
      height: 16px;
    }
    .search-box input:focus + svg {
      fill: #fff;
    }

    /* Зум */
    .zoom-control {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 5px 15px;
    }
    .zoom-control span {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 35px;
      text-align: center;
    }
    .zoom-slider {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
    }
    .zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-main);
      cursor: pointer;
    }

    /* Вьюпорт */
    .viewport {
      width: 100%;
      height: 100%;
      overflow: auto;
      padding-top: 130px;
      padding-bottom: 60px;
      cursor: grab;
      position: relative;
      z-index: 2;
    }
    .viewport:active {
      cursor: grabbing;
    }

    .tree-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-width: max-content;
      margin: 0 auto;
      padding: 40px;
      transform-origin: top center;
      transition: transform 0.15s ease-out;
    }

    /* ==========================================================================
       1. ВЕРТИКАЛЬНОЕ ДЕРЕВО (КЛАССИКА)
       ========================================================================== */
    .tree {
      display: block;
    }
    .tree ul {
      padding-top: 30px;
      position: relative;
      transition: all 0.4s;
      display: flex;
      justify-content: center;
    }
    .tree li {
      text-align: center;
      list-style-type: none;
      position: relative;
      padding: 30px 15px 0 15px;
      transition: all 0.4s;
    }
    .tree li::before, .tree li::after {
      content: '';
      position: absolute;
      top: 0;
      right: 50%;
      border-top: 1.5px solid rgba(255, 255, 255, 0.08);
      width: 50%;
      height: 30px;
    }
    .tree li::after {
      right: auto;
      left: 50%;
      border-left: 1.5px solid rgba(255, 255, 255, 0.08);
    }
    .tree li:only-child::after, .tree li:only-child::before {
      display: none;
    }
    .tree li:only-child {
      padding-top: 0;
    }
    .tree li:first-child::before, .tree li:last-child::after {
      border: 0 none;
    }
    .tree li:last-child::before {
      border-right: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 0 8px 0 0;
    }
    .tree li:first-child::after {
      border-radius: 8px 0 0 0;
    }
    .tree ul ul::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      border-left: 1.5px solid rgba(255, 255, 255, 0.08);
      width: 0;
      height: 30px;
    }

    /* Карточки - Убрали тяжелый backdrop-filter для максимальной плавности */
    .node-card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: var(--panel-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px 24px;
      text-decoration: none;
      color: #fff;
      font-family: var(--font-body);
      min-width: 220px;
      max-width: 260px;
      position: relative;
      z-index: 5;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      will-change: border-color, box-shadow, opacity;
    }

    .node-card:hover {
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5), 0 0 15px var(--glow-color);
      border-color: var(--theme-color);
    }

    .node-card.active-node {
      border-color: var(--theme-color);
      box-shadow: 0 0 25px var(--glow-color);
      background: #1c1f26;
    }

    /* Подсветка пути наследования на карте */
    .node-card.highlight-path {
      border-color: var(--theme-color) !important;
      box-shadow: 0 0 20px var(--glow-color) !important;
      opacity: 1 !important;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      border: 1px solid var(--glass-border);
      color: var(--theme-color);
      transition: all 0.2s ease;
    }
    .node-card:hover .card-icon {
      background: var(--theme-color);
      color: #000;
      border-color: var(--theme-color);
    }

    .node-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      text-align: center;
    }

    .node-role {
      font-family: var(--font-title);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 8px;
    }

    .badge {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: var(--theme-color);
    }

    .director-node { --theme-color: var(--color-dir); --glow-color: var(--color-dir-glow); }
    .sales-node { --theme-color: var(--color-sales); --glow-color: var(--color-sales-glow); }
    .prod-node { --theme-color: var(--color-prod); --glow-color: var(--color-prod-glow); }
    .team-node { --theme-color: var(--color-team); --glow-color: var(--color-team-glow); }
    .support-node { --theme-color: var(--color-support); --glow-color: var(--color-support-glow); }

    /* Облегченное затемнение (без blur и grayscale, которые сильно нагружают видеокарту на ховере) */
    .dimmed {
      opacity: 0.3 !important;
    }

    /* ==========================================================================
       2. ГОРИЗОНТАЛЬНАЯ МЕНТАЛЬНАЯ КАРТА
       ========================================================================== */
    .map-container {
      position: relative;
      width: 1800px;
      height: 1200px;
      background: transparent;
      display: none;
    }

    .map-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    /* Облегченные плавные кривые */
    .map-svg path.bezier-line {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 2px;
      transition: stroke 0.2s ease, stroke-width 0.2s ease, opacity 0.2s ease;
      will-change: stroke, stroke-width, opacity;
    }

    /* Подсвеченный путь (без тяжелых drop-shadow фильтров, тормозящих отрисовку) */
    .map-svg path.bezier-line.highlight {
      stroke: var(--theme-color);
      stroke-width: 3.5px;
      opacity: 1 !important;
    }

    .map-nodes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
    }

    .map-node-card {
      position: absolute;
      transform: translate(-50%, -50%); 
      transition: left 0.4s ease-in-out, top 0.4s ease-in-out, opacity 0.2s ease;
    }

    /* ==========================================================================
       БОКОВАЯ ПАНЕЛЬ ДЕТАЛЕЙ (Drawer)
       ========================================================================== */
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 500px;
      max-width: 100vw;
      height: 100vh;
      background: #111317; /* Убран блюр для скорости работы интерфейса */
      border-left: 1px solid var(--glass-border);
      z-index: 100;
      transform: translateX(100%);
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      color: #fff;
    }
    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 30px 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .drawer-title-group {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .drawer-avatar {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--drawer-theme);
    }

    .drawer-header h2 {
      font-family: var(--font-title);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .drawer-header p {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      transform: scale(1.05);
    }

    .drawer-tabs {
      display: flex;
      padding: 10px 40px 0 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(0,0,0,0.1);
      gap: 30px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 15px 0;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .tab-btn.active {
      color: #fff;
      font-weight: 600;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--drawer-theme);
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 30px 40px;
    }

    .tab-pane {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .tab-pane.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .responsibilities-list {
      list-style-type: none;
    }

    .responsibilities-list li {
      position: relative;
      padding-left: 28px;
      margin-bottom: 16px;
      font-size: 13.5px;
      line-height: 1.6;
      color: #e4e7ec;
    }

    .responsibilities-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 6px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--drawer-theme);
      box-shadow: 0 0 6px var(--drawer-theme);
    }

    .rule-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .rule-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: var(--drawer-theme);
    }

    .rule-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--drawer-theme);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .rule-desc {
      font-size: 13px;
      line-height: 1.5;
      color: #e4e7ec;
    }

    /* Форма редактирования */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 13px;
      transition: all 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--drawer-theme);
      background: rgba(255, 255, 255, 0.08);
    }
    .form-textarea {
      height: 100px;
      resize: vertical;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .save-btn {
      flex: 1;
      background: var(--drawer-theme);
      border: none;
      border-radius: 8px;
      padding: 12px;
      color: #000;
      font-weight: 700;
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .save-btn:hover {
      box-shadow: 0 0 15px var(--drawer-theme);
      opacity: 0.9;
    }
    .reset-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px;
      color: #ef4444;
      font-weight: 600;
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .export-container {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }
    .export-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 12px;
    }
    .export-btn {
      display: block;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 10px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .export-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255,255,255,0.2);
    }

    /* Адаптивность для мобильных устройств */
    @media (max-width: 768px) {
      header {
        position: fixed;
        padding: 12px 16px;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        background: #0c0d0f;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .logo-container {
        text-align: center;
      }
      .logo-container h1 {
        font-size: 18px;
      }
      .logo-container p {
        font-size: 9px;
        letter-spacing: 2px;
      }
      .controls-container {
        flex-direction: column;
        width: 100%;
        gap: 8px;
      }
      .view-switch-control, .search-box, .zoom-control, .edit-mode-btn {
        width: 100%;
        justify-content: center;
      }
      .view-btn {
        flex: 1;
        justify-content: center;
      }
      .search-box input {
        width: 100%;
        text-align: center;
        padding: 8px 20px 8px 40px;
      }
      .search-box input:focus {
        width: 100%;
      }
      .zoom-slider {
        flex: 1;
      }
      .viewport {
        padding-top: 230px; /* Отступ под увеличившуюся шапку */
      }
      .drawer {
        width: 100%;
      }
      .drawer-header {
        padding: 20px;
      }
      .drawer-content {
        padding: 20px;
      }
      .drawer-tabs {
        padding: 0 20px;
        gap: 20px;
      }
    }

    /* ==========================================================================
       ЭКРАН АВТОРИЗАЦИИ (LOGIN SCREEN)
       ========================================================================== */
    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #15171c 0%, #0c0d0f 100%);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .login-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }
    .login-card {
      background: rgba(21, 23, 28, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      width: 420px;
      max-width: 90%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      text-align: center;
      animation: loginFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes loginFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-logo {
      font-family: var(--font-title);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .login-logo span {
      color: var(--color-dir);
    }
    .login-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }
    .login-form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .login-form-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .login-select {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s;
    }
    .login-select:focus {
      border-color: var(--color-dir);
      background: rgba(255, 255, 255, 0.08);
    }
    .pin-input-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }
    .pin-digit {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 50px;
      transition: all 0.2s;
    }
    .pin-digit.filled {
      border-color: var(--color-dir);
      box-shadow: 0 0 10px rgba(226, 192, 68, 0.2);
      background: rgba(226, 192, 68, 0.05);
    }
    .pin-keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .key-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 15px;
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .key-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .key-btn:active {
      transform: scale(0.95);
    }
    .key-btn.backspace {
      color: #ef4444;
    }
    .login-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 15px;
      min-height: 20px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .login-error.visible {
      opacity: 1;
    }

    /* ==========================================================================
       ГЛАВНЫЕ НАВИГАЦИОННЫЕ ВКЛАДКИ
       ========================================================================== */
    .app-tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3px;
      margin-right: 15px;
    }
    .app-tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 17px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .app-tab-btn.active {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .user-profile-widget {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-left: 15px;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
    }
    .user-profile-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }
    .logout-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border-radius: 12px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* ==========================================================================
       ПАНЕЛЬ ЛИЧНОГО КАБИНЕТА (ACCOUNT VIEW)
       ========================================================================== */
    .account-view {
      width: 100vw;
      height: calc(100vh - 100px);
      margin-top: 100px;
      overflow-y: auto;
      padding: 40px;
      position: relative;
      z-index: 5;
      display: none; /* по умолчанию скрыт */
    }
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      animation: fadeIn 0.4s ease;
    }
    
    /* Сетка статистики */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--panel-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }
    .stat-icon-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .stat-info h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 500;
    }
    .stat-info p {
      font-family: var(--font-title);
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    
    /* Карточки разделов */
    .dashboard-section {
      background: var(--panel-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .section-title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 15px;
    }
    .section-title {
      font-family: var(--font-title);
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* Зарплатный прогресс-бар */
    .salary-progress-container {
      margin-top: 15px;
    }
    .salary-progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .salary-progress-bar {
      height: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 5px;
      overflow: hidden;
      display: flex;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4361ee, #2ec4b6);
      transition: width 0.5s ease;
    }
    
    /* Дизайн таблиц */
    .data-table-wrapper {
      overflow-x: auto;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .data-table th {
      padding: 14px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 600;
    }
    .data-table td {
      padding: 14px 16px;
      font-size: 13.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: #e4e7ec;
    }
    .data-table tr:last-child td {
      border-bottom: none;
    }
    .data-table tbody tr {
      transition: background 0.2s;
    }
    .data-table tbody tr:hover td {
      background: rgba(255, 255, 255, 0.01);
      color: #fff;
    }
    .action-cell {
      text-align: right;
    }
    
    /* Финансовые баджи */
    .fin-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .fin-badge.plus {
      background: rgba(46, 196, 182, 0.1);
      color: #2ec4b6;
      border: 1px solid rgba(46, 196, 182, 0.2);
    }
    .fin-badge.minus {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .fin-badge.neutral {
      background: rgba(67, 97, 238, 0.1);
      color: #4361ee;
      border: 1px solid rgba(67, 97, 238, 0.2);
    }
    .text-green { color: #2ec4b6; font-weight: 600; }
    .text-red { color: #ef4444; font-weight: 600; }
    
    /* Кнопки действий директора */
    .admin-actions {
      display: flex;
      gap: 10px;
    }
    .admin-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .admin-btn:hover {
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .admin-btn.primary {
      background: var(--color-dir);
      color: #000;
      border-color: var(--color-dir);
    }
    .admin-btn.primary:hover {
      box-shadow: 0 0 12px rgba(226, 192, 68, 0.4);
      opacity: 0.9;
    }
    
    /* Модальное окно управления окладом/выплатами */
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1050;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-window {
      background: #15171c;
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 35px;
      width: 500px;
      max-width: 90%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }
    .modal-backdrop.open .modal-window {
      transform: translateY(0);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 15px;
    }
    .modal-header h2 {
      font-family: var(--font-title);
      font-size: 20px;
      color: #fff;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
    .modal-close:hover {
      color: #fff;
    }
    
    /* Сетка вкладок финансовых операций в модальном окне */
    .modal-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 15px;
    }
    .modal-tab-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-tab-btn.active {
      background: var(--color-dir-glow);
      color: var(--color-dir);
      border-color: var(--color-dir);
    }
    
    /* Форма финансовых операций */
    .fin-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    /* Адаптивность панели ЗП под мобильные */
    @media (max-width: 768px) {
      .account-view {
        padding: 20px 16px;
        height: calc(100vh - 230px);
        margin-top: 230px;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .dashboard-section {
        padding: 20px 16px;
      }
      .section-title-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .admin-actions {
        width: 100%;
        justify-content: space-between;
      }
      .modal-window {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Экран Авторизации -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">ISOLA <span>Мебель</span></div>
      <div class="login-subtitle">Портал сотрудников</div>
      
      <div class="login-form-group">
        <label for="login-user-select">Сотрудник</label>
        <select id="login-user-select" class="login-select">
          <!-- Опции заполняются динамически из JS -->
        </select>
      </div>
      
      <div class="login-form-group">
        <label>Введите PIN-код</label>
        <div class="pin-input-container">
          <div class="pin-digit" id="pin-0"></div>
          <div class="pin-digit" id="pin-1"></div>
          <div class="pin-digit" id="pin-2"></div>
          <div class="pin-digit" id="pin-3"></div>
        </div>
        
        <div class="pin-keyboard">
          <button class="key-btn" data-key="1">1</button>
          <button class="key-btn" data-key="2">2</button>
          <button class="key-btn" data-key="3">3</button>
          <button class="key-btn" data-key="4">4</button>
          <button class="key-btn" data-key="5">5</button>
          <button class="key-btn" data-key="6">6</button>
          <button class="key-btn" data-key="7">7</button>
          <button class="key-btn" data-key="8">8</button>
          <button class="key-btn" data-key="9">9</button>
          <button class="key-btn" style="padding: 10px; font-size: 13px;" id="clear-pin-btn">Сброс</button>
          <button class="key-btn" data-key="0">0</button>
          <button class="key-btn backspace" id="backspace-pin-btn">⌫</button>
        </div>
      </div>
      
      <div class="login-error" id="login-error">Неверный PIN-код</div>
    </div>
  </div>

  <!-- Заднее свечение -->
  <div class="ambient-container">
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="ambient-glow glow-3"></div>
  </div>

  <!-- Шапка управления -->
  <header>
    <div class="logo-container">
      <h1>ISOLA <span>Мебель</span></h1>
      <p>Корпоративный портал компании</p>
    </div>
    
    <div class="controls-container">
      <!-- Вкладки приложения -->
      <div class="app-tabs">
        <button class="app-tab-btn active" id="tab-cabinet-btn">📋 Кабинет</button>
        <button class="app-tab-btn" id="tab-chart-btn">🌳 Структура</button>
      </div>

      <!-- Контейнер инструментов структуры (для скрытия на вкладке Кабинет) -->
      <div id="chart-controls" style="display: none; align-items: center; gap: 15px;">
        <!-- Переключатель Вида -->
        <div class="view-switch-control">
          <button class="view-btn" id="view-tree-btn">🌳 Дерево</button>
          <button class="view-btn active" id="view-map-btn">🗺️ Карта связей</button>
        </div>

        <!-- Переключатель режима редактирования -->
        <button class="edit-mode-btn" id="edit-mode-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px;"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          <span>Режим редактирования</span>
        </button>

        <!-- Поиск по сотрудникам -->
        <div class="search-box">
          <input type="text" id="search" placeholder="Поиск по имени/роли...">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>

        <!-- Зум -->
        <div class="zoom-control">
          <span>Зум</span>
          <input type="range" id="zoom" class="zoom-slider" min="0.5" max="1.5" step="0.05" value="1">
          <span id="zoom-val">100%</span>
        </div>
      </div>

      <!-- Профиль текущего пользователя -->
      <div class="user-profile-widget">
        <span class="user-profile-name" id="user-profile-name">Загрузка...</span>
        <button class="logout-btn" id="logout-btn">Выйти</button>
      </div>
    </div>
  </header>

  <!-- Интерактивная область структуры -->
  <div class="viewport" id="viewport" style="display: none;">
    <div class="tree-wrapper" id="tree-wrapper">
      <!-- 1. Классическое Вертикальное Дерево -->
      <div class="tree" id="tree-container" style="display: none;">
        <!-- Генерируется динамически через JS -->
      </div>
      
      <!-- 2. Горизонтальная Ментальная Карта (Bezier Curves) -->
      <div class="map-container" id="map-container" style="display: block;">
        <svg class="map-svg" id="map-svg">
          <!-- Линии связей Безье отрисовываются здесь -->
        </svg>
        <div class="map-nodes" id="map-nodes">
          <!-- Карточки графа отрисовываются здесь -->

    // Инициализация базы данных (проверка localStorage)

    try {
      const storedData = localStorage.getItem('isola_tree_data');
      if (storedData) {
        employeesData = JSON.parse(storedData);
      } else {
        employeesData = JSON.parse(JSON.stringify(defaultTreeData));
      }
    } catch (e) {
      employeesData = JSON.parse(JSON.stringify(defaultTreeData));
    }

    // Рекурсивный расчет уровня вложенности (глубины)
    function getNodeDepth(node) {
      let depth = 0;
      let current = node;
      const visited = new Set();
      
      while (current.parent) {
        if (visited.has(current.id)) break; // Предотвращение зацикливаний
        visited.add(current.id);
        
        const parentNode = employeesData.find(n => n.id === current.parent);
        if (!parentNode) break;
        
        current = parentNode;
        depth++;
      }
      return depth;
    }

    // ==========================================================================
    // ЛОГИКА РЕНДЕРИНГА 1: КЛАССИЧЕСКОЕ ДЕРЕВО (ВЕРТИКАЛЬНОЕ)
    // ==========================================================================
    function renderTree() {
      const container = document.getElementById('tree-container');
      const roots = employeesData.filter(n => n.parent === null);
      
      let html = '<ul>';
      roots.forEach(node => {
        const cardClass = `node-card ${node.type}-node`;
        html += `
          <li>
            <div class="${cardClass}" data-id="${node.id}">
              <div class="card-icon">${node.icon}</div>
              <div class="node-name">${node.name}</div>
              <div class="node-role">${node.role}</div>
              <span class="badge">${node.dept}</span>
            </div>
            ${buildTreeHtml(employeesData, node.id)}
          </li>
        `;
      });
      html += '</ul>';
      
      container.innerHTML = html;
      attachCardListeners();
    }

    // ==========================================================================
    // ЛОГИКА РЕНДЕРИНГА 2: ГОРИЗОНТАЛЬНАЯ МЕНТАЛЬНАЯ КАРТА (ОПТИМИЗИРОВАННАЯ)
    // ==========================================================================
    let leafCount = 0;

    // Математический расчет позиций для создания чистого горизонтального графа
    function calculateHorizontalPositions() {
      leafCount = 0;
      const leafYSpacing = 135; // вертикальное расстояние между листами дерева
      
      // Находим корневой элемент (Директор)
      const rootNode = employeesData.find(n => n.parent === null);
      if (!rootNode) return;

      // Рекурсивная функция разметки координат
      function positionNode(nodeId, depth) {
        const node = employeesData.find(n => n.id === nodeId);
        if (!node) return;

        // X координата зависит строго от уровня вложенности (350px между колонками)
        node.x = 180 + depth * 350;

        const children = employeesData.filter(n => n.parent === nodeId);
        if (children.length === 0) {
          // Если это лист (нет подчиненных) — ставим его по порядку по вертикали
          node.y = 120 + leafCount * leafYSpacing;
          leafCount++;
        } else {
          // Сначала позиционируем дочерние элементы
          children.forEach(child => {
            positionNode(child.id, depth + 1);
          });
          // Координата Y родителя — среднее арифметическое Y координат его детей
          const sumY = children.reduce((sum, child) => sum + child.y, 0);
          node.y = sumY / children.length;
        }
      }

      positionNode(rootNode.id, 0);
    }

    function renderMapDOM() {
      const container = document.getElementById('map-container');
      const nodesContainer = document.getElementById('map-nodes');
      nodesContainer.innerHTML = '';

      // Рассчитываем позиции
      calculateHorizontalPositions();

      // Устанавливаем высоту контейнера карты динамически на основе числа листьев
      const mapHeight = Math.max(800, 150 + leafCount * 135);
      container.style.height = `${mapHeight}px`;

      // Размещаем карточки
      employeesData.forEach(node => {
        const cardClass = `node-card map-node-card ${node.type}-node`;
        const card = document.createElement('div');
        card.className = cardClass;
        card.setAttribute('data-id', node.id);
        card.style.left = `${node.x}px`;
        card.style.top = `${node.y}px`;
        card.innerHTML = `
          <div class="card-icon">${node.icon}</div>
          <div class="node-name">${node.name}</div>
          <div class="node-role">${node.role}</div>
          <span class="badge">${node.dept}</span>
        `;
        
        // Интерактивная подсветка пути при наведении мыши (ОПТИМИЗИРОВАННАЯ, без тормозов)
        card.addEventListener('mouseenter', () => highlightPath(node.id, true));
        card.addEventListener('mouseleave', () => highlightPath(node.id, false));

        nodesContainer.appendChild(card);
      });

      // Рисуем линии Безье
      renderMapLines();
      attachCardListeners();
    }

    // Отрисовка сглаженных линий связей Безье в SVG
    function renderMapLines() {
      const svg = document.getElementById('map-svg');
      let paths = '';

      employeesData.forEach(node => {
        if (node.parent) {
          const parentNode = employeesData.find(n => n.id === parentNodeId(node));
          if (parentNode) {
            // Выход из правого торца родительской карточки
            const x1 = parentNode.x + 110; 
            const y1 = parentNode.y;
            
            // Вход в левый торец карточки подчиненного
            const x2 = node.x - 110;
            const y2 = node.y;

            // Расчет контрольных точек кривой Безье для гладкого S-образного изгиба
            const cp1x = x1 + (x2 - x1) * 0.5;
            const cp1y = y1;
            const cp2x = x1 + (x2 - x1) * 0.5;
            const cp2y = y2;

            // Определяем тему для цвета линии
            const themeColor = node.theme || `var(--color-${node.type})`;
            const glowColor = `var(--color-${node.type}-glow)`;

            paths += `
              <path 
                id="path-${parentNode.id}-${node.id}" 
                class="bezier-line" 
                d="M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}" 
                style="--theme-color: ${themeColor}; --glow-color: ${glowColor};"
              />`;
          }
        }
      });

      svg.innerHTML = paths;
    }

    function parentNodeId(node) {
      return node.parent;
    }

    // Подсветка цепочки подчинения (ОПТИМИЗИРОВАННАЯ, без blur и grayscale фильтров)
    function highlightPath(nodeId, active) {
      let currentId = nodeId;
      const pathNodes = new Set();
      const pathConnections = [];

      // Собираем всех родителей в цепочке
      while (currentId) {
        pathNodes.add(currentId);
        const node = employeesData.find(n => n.id === currentId);
        if (node && node.parent) {
          pathConnections.push({ parent: node.parent, child: currentId });
          currentId = node.parent;
        } else {
          break;
        }
      }

      // Подсвечиваем или сбрасываем линии связей
      pathConnections.forEach(conn => {
        const line = document.getElementById(`path-${conn.parent}-${conn.child}`);
        if (line) {
          if (active) {
            line.classList.add('highlight');
          } else {
            line.classList.remove('highlight');
          }
        }
      });

      // Подсвечиваем или сбрасываем карточки (Использование только GPU-акселерированного opacity)
      employeesData.forEach(node => {
        const card = document.querySelector(`.map-node-card[data-id="${node.id}"]`);
        if (card) {
          if (active) {
            if (pathNodes.has(node.id)) {
              card.classList.add('highlight-path');
              card.classList.remove('dimmed');
            } else {
              card.classList.remove('highlight-path');
              card.classList.add('dimmed');
            }
          } else {
            card.classList.remove('highlight-path');
            card.classList.remove('dimmed');
          }
        }
      });
    }

    // ==========================================================================
    let currentUser = null;

    let activeModalTab = 'accrual';

    const viewport = document.getElementById('viewport');
    const accountView = document.getElementById('account-view');
    const chartControls = document.getElementById('chart-controls');
    
    const tabCabinetBtn = document.getElementById('tab-cabinet-btn');
    const tabChartBtn = document.getElementById('tab-chart-btn');
    const logoutBtn = document.getElementById('logout-btn');

    let isCloudView = true; // Карта по умолчанию

    // Переключение главных вкладок портала
    function switchAppTab(tab) {
      if (tab === 'cabinet') {
        tabCabinetBtn.classList.add('active');
        tabChartBtn.classList.remove('active');
        chartControls.style.display = 'none';
        viewport.style.display = 'none';
        accountView.style.display = 'block';
        renderDashboard();
      } else if (tab === 'chart') {
        tabCabinetBtn.classList.remove('active');
        tabChartBtn.classList.add('active');
        chartControls.style.display = 'flex';
        viewport.style.display = 'block';
        accountView.style.display = 'none';
        
        // Перерисовываем структуру
        if (isCloudView) {
          renderMapDOM();
        } else {
          renderTree();
        }
      }
    }

    tabCabinetBtn.addEventListener('click', () => switchAppTab('cabinet'));
    tabChartBtn.addEventListener('click', () => switchAppTab('chart'));

    // Выход из системы
    logoutBtn.addEventListener('click', () => {
      currentUser = null;
      sessionStorage.removeItem('isola_logged_in_user');
      document.getElementById('login-screen').classList.remove('hidden');
      initLoginUserSelect();
      enteredPin = "";
      updatePinDisplay();
    });

    // Форматирование валюты сум (UZS)
    function formatCurrency(amount) {
      return new Intl.NumberFormat('uz-UZ', {
        style: 'currency',
        currency: 'UZS',
        maximumFractionDigits: 0
      }).format(amount).replace('UZS', 'сум');
    }

    // Инициализация выпадающего списка сотрудников на входе
    function initLoginUserSelect() {
      const select = document.getElementById('login-user-select');
      select.innerHTML = '';
      employeesData.forEach(emp => {
        if (emp.pin) {
          select.innerHTML += `<option value="${emp.id}">${emp.name} (${emp.role})</option>`;
        }
      });
    }

    // Управление виртуальной PIN клавиатурой
    function updatePinDisplay() {
      for (let i = 0; i < 4; i++) {
        const digitEl = document.getElementById(`pin-${i}`);
        if (i < enteredPin.length) {
          digitEl.textContent = "●";
          digitEl.classList.add('filled');
        } else {
          digitEl.textContent = "";
          digitEl.classList.remove('filled');
        }
      }
    }

    // Key buttons click
    document.querySelectorAll('.pin-keyboard .key-btn[data-key]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (enteredPin.length < 4) {
          enteredPin += btn.getAttribute('data-key');
          updatePinDisplay();
          document.getElementById('login-error').classList.remove('visible');
          if (enteredPin.length === 4) {
            verifyPin();
          }
        }
      });
    });

    document.getElementById('clear-pin-btn').addEventListener('click', () => {
      enteredPin = "";
      updatePinDisplay();
      document.getElementById('login-error').classList.remove('visible');
    });

    document.getElementById('backspace-pin-btn').addEventListener('click', () => {
      if (enteredPin.length > 0) {
        enteredPin = enteredPin.slice(0, -1);
        updatePinDisplay();
        document.getElementById('login-error').classList.remove('visible');
      }
    });

    // Проверка PIN-кода
    function verifyPin() {
      const selectedUserId = document.getElementById('login-user-select').value;
      const user = employeesData.find(e => e.id === selectedUserId);
      
      if (user && user.pin === enteredPin) {
        // Успешный вход
        currentUser = user;
        sessionStorage.setItem('isola_logged_in_user', user.id);
        
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('login-error').classList.remove('visible');
        document.getElementById('user-profile-name').textContent = `${user.name} (${user.role})`;
        
        switchAppTab('cabinet');
        enteredPin = "";
        updatePinDisplay();
      } else {
        // Ошибка PIN
        const errorEl = document.getElementById('login-error');
        errorEl.textContent = "Неверный PIN-код! Попробуйте еще раз.";
        errorEl.classList.add('visible');
        enteredPin = "";
        setTimeout(() => {
          updatePinDisplay();
        }, 500);
      }
    }

    // Проверка существующей сессии при запуске
    function checkSession() {
      const loggedInUserId = sessionStorage.getItem('isola_logged_in_user');
      if (loggedInUserId) {
        const user = employeesData.find(e => e.id === loggedInUserId);
        if (user) {
          currentUser = user;
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('user-profile-name').textContent = `${user.name} (${user.role})`;
          switchAppTab('cabinet');
          return;
        }
      }
      document.getElementById('login-screen').classList.remove('hidden');
      initLoginUserSelect();
    }

    // Отрисовка Дашбордов в зависимости от прав доступа
    function renderDashboard() {
      const container = document.getElementById('dashboard-container');
      if (!currentUser) return;

      if (currentUser.id === 'dir_owner') {
        renderDirectorDashboard(container);
      } else {
        renderEmployeeDashboard(container, currentUser);
      }
    }

      let totalBase = 0;
      let totalAccruals = 0;
      let totalAdvances = 0;
      let totalFines = 0;
      let totalNet = 0;

          const advancesSum = (emp.salary.advances || []).reduce((sum, item) => sum + item.amount, 0);
          const finesSum = (emp.salary.fines || []).reduce((sum, item) => sum + item.amount, 0);
          
          totalAccruals += accrualsSum;
          totalAdvances += advancesSum;
          totalFines += finesSum;
          totalNet += (emp.salary.base || 0) + accrualsSum - advancesSum - finesSum;

            <div class="stat-info">
              <h3>Итого к выплате</h3>
              <p class="text-green" style="font-size: 26px;">${formatCurrency(totalNet)}</p>

          </div>

        <div class="dashboard-section">
          <div class="section-title-bar">
            <div class="section-title">📊 Ведомость заработной платы персонала</div>
          </div>
          
          <div class="data-table-wrapper">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Сотрудник</th>
                  <th>Должность / Отдел</th>

                  <th>Штрафы</th>
                  <th>К выплате</th>
                  <th class="action-cell">Действие</th>
                </tr>
              </thead>
              <tbody>
      `;

      employeesData.forEach(emp => {
        if (!emp.salary) return;

        const base = emp.salary.base || 0;
        const accruals = (emp.salary.accruals || []).reduce((sum, item) => sum + item.amount, 0);
        const advances = (emp.salary.advances || []).reduce((sum, item) => sum + item.amount, 0);
        const fines = (emp.salary.fines || []).reduce((sum, item) => sum + item.amount, 0);
        const net = base + accruals - advances - fines;

        html += `
          <tr>
            <td>
              <div style="font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 18px;">${emp.type === 'director' ? '👑' : emp.type === 'sales' ? '💼' : emp.type === 'prod' ? '🔧' : '🛠️'}</span>
                <div>

      html += `

      document.getElementById('reset-month-btn').addEventListener('click', () => {

          employeesData.forEach(emp => {

    // Личный кабинет СОТРУДНИКА

      const totalAccrued = base + accrualsSum;

      const paidPercentage = totalAccrued > 0 ? Math.min(100, Math.round((advancesSum / totalAccrued) * 100)) : 0;

      const history = [];
      (emp.salary.accruals || []).forEach(item => history.push({ ...item, type: 'accrual' }));

      let html = `

        <div class="stats-grid">

            <div class="stat-icon-wrapper" style="color: var(--color-prod);">💼</div>

              <p>${formatCurrency(base)}</p>

            <div class="stat-info">
              <h3>Получено авансом</h3>
              <p style="color:#e2c044;">-${formatCurrency(advancesSum)}</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon-wrapper" style="color: #ef4444;">🚨</div>
            <div class="stat-info">
              <h3>Штрафы / Вычеты</h3>
              <p class="text-red">-${formatCurrency(finesSum)}</p>
            </div>
          </div>
          <div class="stat-card" style="background: rgba(46,196,182,0.05); border-color: rgba(46,196,182,0.2);">
            <div class="stat-icon-wrapper" style="color: #2ec4b6;">💳</div>
            <div class="stat-info">
              <h3>Остаток к получению</h3>

              <span>${paidPercentage}% выдано (${formatCurrency(advancesSum)} из начисленных ${formatCurrency(totalAccrued)})</span>
            </div>
            <div class="salary-progress-bar">
              <div class="progress-fill" style="width: ${paidPercentage}%;"></div>
            </div>
          </div>
        </div>

        <div class="history-duties-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px;">
          <!-- Расчетный лист -->
          <div class="dashboard-section" style="margin-bottom: 0;">
            <div class="section-title-bar">
              <div class="section-title">📄 Расчетная выписка за текущий месяц</div>

                  </tr>
      `;

      if (history.length === 0) {
        html += `
          <tr>
            <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 30px; font-size: 13px;">
              Нет дополнительных начислений, авансов или вычетов.

          </tr>

      } else {
        history.forEach(item => {
          let badge = '';
          let cls = '';
          let pfx = '';
          
          if (item.type === 'accrual') {
            badge = '<span class="fin-badge plus">Премия</span>';

      html += `
              </ul>
              
              <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
                <div style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px;">
                  ⚡ Автоматические триггеры и регламент:
                </div>
      `;

      emp.automation.forEach(rule => {
        html += `
          <div class="rule-card" style="margin-bottom: 10px;">
            <div class="rule-header" style="color: var(--color-prod);">${rule.title}</div>

      html += `

      container.innerHTML = html;

    // Модальное окно Директора для управления ЗП
    const salaryModal = document.getElementById('salary-modal');
    const modalEmployeeTitle = document.getElementById('modal-employee-title');

    function openSalaryModal(empId) {
      activeModalEmployeeId = empId;
      const emp = employeesData.find(e => e.id === empId);
      if (!emp) return;

      modalEmployeeTitle.textContent = `Управление выплатами: ${emp.name}`;
      
      document.getElementById('accrual-amount').value = '';
      document.getElementById('accrual-reason').value = '';
      document.getElementById('advance-amount').value = '';
      document.getElementById('advance-reason').value = '';
      document.getElementById('fine-amount').value = '';
      document.getElementById('fine-reason').value = '';
      document.getElementById('base-salary-amount').value = emp.salary.base || 0;

      switchModalTab('accrual');
      salaryModal.classList.add('open');
    }

    function closeSalaryModal() {
      salaryModal.classList.remove('open');
      activeModalEmployeeId = null;
    }

    document.getElementById('modal-close-btn').addEventListener('click', closeSalaryModal);

    function switchModalTab(tab) {
      activeModalTab = tab;
      
      document.querySelectorAll('.modal-tab-btn').forEach(btn => {
        const isCurrent = btn.getAttribute('data-modal-tab') === tab;
        btn.classList.toggle('active', isCurrent);
      });

      document.querySelectorAll('.fin-form').forEach(form => {
        const isCurrent = form.id === `form-${tab}`;
        form.style.display = isCurrent ? 'flex' : 'none';
      });
    }

    document.querySelectorAll('.modal-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        switchModalTab(btn.getAttribute('data-modal-tab'));
      });
    });

    // Сохранение форм ЗП в модальном окне
    document.getElementById('save-accrual-btn').addEventListener('click', () => {
      const amount = Number(document.getElementById('accrual-amount').value);
      const reason = document.getElementById('accrual-reason').value.trim() || 'Премия';
      
      if (amount <= 0 || isNaN(amount)) {
        alert("Пожалуйста, введите корректную сумму начисления.");
        return;
      }

      const emp = employeesData.find(e => e.id === activeModalEmployeeId);
      if (emp && emp.salary) {
        emp.salary.accruals.push({
          date: new Date().toISOString().split('T')[0],
          amount: amount,
          reason: reason
        });
        localStorage.setItem('isola_tree_data', JSON.stringify(employeesData));
        closeSalaryModal();
        renderDashboard();
      }
    });

    document.getElementById('save-advance-btn').addEventListener('click', () => {
      const amount = Number(document.getElementById('advance-amount').value);
      const reason = document.getElementById('advance-reason').value.trim() || 'Аванс';
      
      if (amount <= 0 || isNaN(amount)) {
        alert("Пожалуйста, введите корректную сумму аванса.");
        return;
      }

      const emp = employeesData.find(e => e.id === activeModalEmployeeId);
      if (emp && emp.salary) {
        emp.salary.advances.push({
          date: new Date().toISOString().split('T')[0],
          amount: amount,
          reason: reason
        });
        localStorage.setItem('isola_tree_data', JSON.stringify(employeesData));
        closeSalaryModal();
        renderDashboard();
      }
    });

    document.getElementById('save-fine-btn').addEventListener('click', () => {
      const amount = Number(document.getElementById('fine-amount').value);
      const reason = document.getElementById('fine-reason').value.trim() || 'Штраф';
      
      if (amount <= 0 || isNaN(amount)) {
        alert("Пожалуйста, введите корректную сумму штрафа.");
        return;
      }

      const emp = employeesData.find(e => e.id === activeModalEmployeeId);
      if (emp && emp.salary) {
        emp.salary.fines.push({
          date: new Date().toISOString().split('T')[0],
          amount: amount,
          reason: reason
        });
        localStorage.setItem('isola_tree_data', JSON.stringify(employeesData));
        closeSalaryModal();
        renderDashboard();
      }
    });

    document.getElementById('save-base-btn').addEventListener('click', () => {
      const amount = Number(document.getElementById('base-salary-amount').value);
      
      if (amount <= 0 || isNaN(amount)) {
        alert("Пожалуйста, введите корректную сумму оклада.");
        return;
      }

      const emp = employeesData.find(e => e.id === activeModalEmployeeId);
      if (emp && emp.salary) {
        emp.salary.base = amount;
        localStorage.setItem('isola_tree_data', JSON.stringify(employeesData));
        closeSalaryModal();
        renderDashboard();
      }
    });

    // ==========================================================================
    // ЛОГИКА ОТОБРАЖЕНИЯ СТРУКТУРЫ (КАРТА И ДЕРЕВО)
    // ==========================================================================
    const viewTreeBtn = document.getElementById('view-tree-btn');
    const viewMapBtn = document.getElementById('view-map-btn');
    const treeContainer = document.getElementById('tree-container');
    const mapContainer = document.getElementById('map-container');

    viewTreeBtn.addEventListener('click', () => {
      isCloudView = false;
      viewTreeBtn.classList.add('active');
      viewMapBtn.classList.remove('active');
      treeContainer.style.display = 'block';
      mapContainer.style.display = 'none';
      renderTree();
      
      viewport.scrollLeft = (treeContainer.clientWidth - viewport.clientWidth) / 2;
      viewport.scrollTop = 0;
    });

    viewMapBtn.addEventListener('click', () => {
      isCloudView = true;
      viewTreeBtn.classList.remove('active');
      viewMapBtn.classList.add('active');
      treeContainer.style.display = 'none';
      mapContainer.style.display = 'block';
      renderMapDOM();

      viewport.scrollLeft = 0;
      viewport.scrollTop = (mapContainer.clientHeight - viewport.clientHeight) / 2;
    });

    // Построение иерархии рекурсивно для дерева
    function buildTreeHtml(data, parentId) {
      const children = data.filter(n => n.parent === parentId);
      if (children.length === 0) return '';
      
      let html = '<ul>';
      children.forEach(node => {
        const cardClass = `node-card ${node.type}-node`;
        html += `
          <li>
            <div class="${cardClass}" data-id="${node.id}">
              <div class="card-icon">${node.icon}</div>
              <div class="node-name">${node.name}</div>
              <div class="node-role">${node.role}</div>
              <span class="badge">${node.dept}</span>
            </div>
            ${buildTreeHtml(data, node.id)}
          </li>
        `;
      });
      html += '</ul>';
      return html;
    }

    // Панорамирование
    let isViewportDragging = false;
    let startViewportX, startViewportY, scrollViewportLeft, scrollViewportTop;

    viewport.addEventListener('mousedown', (e) => {
      if (e.target.closest('.node-card') || e.target.closest('header') || e.target.closest('.drawer')) return;
      isViewportDragging = true;
      viewport.style.cursor = 'grabbing';
      startViewportX = e.pageX - viewport.offsetLeft;
      startViewportY = e.pageY - viewport.offsetTop;
      scrollViewportLeft = viewport.scrollLeft;
      scrollViewportTop = viewport.scrollTop;
    });

    viewport.addEventListener('mouseleave', () => {
      isViewportDragging = false;
      viewport.style.cursor = 'grab';
    });

    viewport.addEventListener('mouseup', () => {
      isViewportDragging = false;
      viewport.style.cursor = 'grab';
    });

    viewport.addEventListener('mousemove', (e) => {
      if (!isViewportDragging) return;
      e.preventDefault();
      const x = e.pageX - viewport.offsetLeft;
      const y = e.pageY - viewport.offsetTop;
      const walkX = (x - startViewportX) * 1.5; 
      const walkY = (y - startViewportY) * 1.5;
      viewport.scrollLeft = scrollViewportLeft - walkX;
      viewport.scrollTop = scrollViewportTop - walkY;
    });

    // Зум
    const zoomSlider = document.getElementById('zoom');
    const zoomValLabel = document.getElementById('zoom-val');
    const treeWrapper = document.getElementById('tree-wrapper');

    zoomSlider.addEventListener('input', (e) => {
      const value = e.target.value;
      treeWrapper.style.transform = `scale(${value})`;
      zoomValLabel.textContent = `${Math.round(value * 100)}%`;
    });

    // Режим редактирования структуры
    const editModeBtn = document.getElementById('edit-mode-btn');
    const editTabBtn = document.getElementById('edit-tab-btn');
    let isEditMode = false;

    editModeBtn.addEventListener('click', () => {
      isEditMode = !isEditMode;
      editModeBtn.classList.toggle('active', isEditMode);
      document.body.classList.toggle('edit-active', isEditMode);
      editTabBtn.style.display = isEditMode ? 'block' : 'none';
      
      if (!isEditMode) {
        switchTab('responsibilities');
      }
    });

    // Детальная боковая панель сотрудника
    const drawerOverlay = document.getElementById('drawer-overlay');
    const drawer = document.getElementById('drawer');
    const closeBtn = document.getElementById('close-btn');

    const drawerName = document.getElementById('drawer-name');
    const drawerRole = document.getElementById('drawer-role');
    const drawerAvatar = document.getElementById('drawer-avatar');
    const responsibilitiesList = document.getElementById('responsibilities-list');
    const automationList = document.getElementById('automation-list');

    let currentSelectedNodeId = null;

    function attachCardListeners() {
      const cards = document.querySelectorAll('.node-card');
      cards.forEach(card => {
        card.addEventListener('click', () => {
          const id = card.getAttribute('data-id');
          const data = employeesData.find(e => e.id === id);
          
          if (!data) return;
          currentSelectedNodeId = id;

          cards.forEach(c => c.classList.remove('active-node'));
          card.classList.add('active-node');

          document.documentElement.style.setProperty('--drawer-theme', data.theme || 'var(--color-prod)');
          drawer.style.setProperty('--drawer-theme', data.theme || 'var(--color-prod)');

          drawerName.textContent = data.name;
          drawerRole.textContent = data.role;
          drawerAvatar.innerHTML = data.icon;

          responsibilitiesList.innerHTML = '';
          data.responsibilities.forEach(task => {
            const li = document.createElement('li');
            li.textContent = task;
            responsibilitiesList.appendChild(li);
          });

          automationList.innerHTML = '';
          (data.automation || []).forEach(rule => {
            const ruleCard = document.createElement('div');
            ruleCard.className = 'rule-card';
            ruleCard.innerHTML = `<div class="rule-header">${rule.title}</div><div class="rule-desc">${rule.desc}</div>`;
            automationList.appendChild(ruleCard);
          });

          // Редактирование
          document.getElementById('edit-name-input').value = data.name;
          document.getElementById('edit-role-input').value = data.role;
          document.getElementById('edit-dept-input').value = data.dept;
          document.getElementById('edit-resp-textarea').value = data.responsibilities.join('\n');
          document.getElementById('edit-auto-textarea').value = (data.automation || []).map(r => `${r.title};${r.desc}`).join('\n');

          populateParentSelect(id, data.parent);

          drawer.classList.add('open');
          drawerOverlay.classList.add('open');
        });
      });
    }

    function populateParentSelect(currentNodeId, currentParentId) {
      const select = document.getElementById('edit-parent-select');
      select.innerHTML = '<option value="root">Нет руководителя (Глава компании)</option>';
      
      employeesData.forEach(emp => {
        if (emp.id !== currentNodeId && !isDescendant(emp.id, currentNodeId)) {
          const selected = emp.id === currentParentId ? 'selected' : '';
          select.innerHTML += `<option value="${emp.id}" ${selected}>${emp.name} (${emp.role})</option>`;
        }
      });
    }

    function isDescendant(possibleParentId, nodeId) {
      if (possibleParentId === nodeId) return true;
      const node = employeesData.find(e => e.id === possibleParentId);
      if (!node || !node.parent) return false;
      return isDescendant(node.parent, nodeId);
    }

    function closeDrawer() {
      drawer.classList.remove('open');
      drawerOverlay.classList.remove('open');
      document.querySelectorAll('.node-card').forEach(c => c.classList.remove('active-node'));
      currentSelectedNodeId = null;
    }

    closeBtn.addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);

    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabPanes = document.querySelectorAll('.tab-pane');

    function switchTab(tabName) {
      tabBtns.forEach(b => b.classList.remove('active'));
      tabPanes.forEach(p => p.classList.remove('active'));
      
      const activeBtn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
      if (activeBtn) activeBtn.classList.add('active');
      
      const activePane = document.getElementById(`tab-${tabName}`);
      if (activePane) activePane.classList.add('active');
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        switchTab(btn.getAttribute('data-tab'));
      });
    });

    // Сохранение изменений в карточке сотрудника
    const saveNodeBtn = document.getElementById('save-node-btn');
    saveNodeBtn.addEventListener('click', () => {
      if (!currentSelectedNodeId) return;

      const nodeIndex = employeesData.findIndex(e => e.id === currentSelectedNodeId);
      if (nodeIndex === -1) return;

      const newName = document.getElementById('edit-name-input').value.trim();
      const newRole = document.getElementById('edit-role-input').value.trim();
      const newDept = document.getElementById('edit-dept-input').value.trim();
      const newParentVal = document.getElementById('edit-parent-select').value;
      const newParent = newParentVal === 'root' ? null : newParentVal;

      const newResp = document.getElementById('edit-resp-textarea').value
        .split('\n')
        .map(line => line.trim())
        .filter(line => line !== '');

      const newAutoLines = document.getElementById('edit-auto-textarea').value
        .split('\n')
        .map(line => line.trim())
        .filter(line => line !== '');

      const newAuto = newAutoLines.map(line => {
        const parts = line.split(';');
        return {
          title: parts[0] ? parts[0].trim() : 'Напоминание',
          desc: parts[1] ? parts[1].trim() : (parts[0] ? parts[0].trim() : '')
        };
      });

      employeesData[nodeIndex].name = newName;
      employeesData[nodeIndex].role = newRole;
      employeesData[nodeIndex].dept = newDept;
      employeesData[nodeIndex].parent = newParent;
      employeesData[nodeIndex].responsibilities = newResp;
      employeesData[nodeIndex].automation = newAuto;

      localStorage.setItem('isola_tree_data', JSON.stringify(employeesData));

      if (isCloudView) {
        renderMapDOM();
      } else {
        renderTree();
      }

      closeDrawer();
    });

    // Сбросить дерево
    const resetTreeBtn = document.getElementById('reset-tree-btn');
    resetTreeBtn.addEventListener('click', () => {
      if (confirm("Вы уверены, что хотите сбросить структуру к исходной? Все изменения будут удалены.")) {
        localStorage.removeItem('isola_tree_data');
        employeesData = JSON.parse(JSON.stringify(defaultTreeData));
        if (isCloudView) {
          renderMapDOM();
        } else {
          renderTree();
        }
        closeDrawer();
      }
    });

    // Экспорт обновленного HTML с базой
    const exportHtmlBtn = document.getElementById('export-html-btn');
    exportHtmlBtn.addEventListener('click', () => {
      let html = document.documentElement.outerHTML;
      const updatedDataString = `const defaultTreeData = ${JSON.stringify(employeesData, null, 2)};`;

      html = html.replace(/const defaultTreeData = \[\s*[\s\S]*?\s*\];/, updatedDataString);
      html = html.replace('class="edit-active"', '');
      html = html.replace('active-node', '');
      html = html.replace('class="drawer open"', 'class="drawer"');
      html = html.replace('class="drawer-overlay open"', 'class="drawer-overlay"');
      html = html.replace('class="login-screen hidden"', 'class="login-screen"');

      const blob = new Blob(['<!DOCTYPE html>\n' + html], { type: 'text/html' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'index.html';
      link.click();
    });

    // Поиск
    const searchInput = document.getElementById('search');
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      const cards = document.querySelectorAll('.node-card');
      
      if (query === '') {
        cards.forEach(card => card.classList.remove('dimmed'));
        return;
      }

      cards.forEach(card => {
        const id = card.getAttribute('data-id');
        const data = employeesData.find(e => e.id === id);
        
        if (data) {
          const nameMatches = data.name.toLowerCase().includes(query);
          const roleMatches = data.role.toLowerCase().includes(query);
          const deptMatches = data.dept.toLowerCase().includes(query);
          
          if (nameMatches || roleMatches || deptMatches) {
            card.classList.remove('dimmed');
          } else {
            card.classList.add('dimmed');
          }
        }
      });
    });

    // Запуск при старте
    isCloudView = true;
    checkSession();  </script>
</body>
</html>
