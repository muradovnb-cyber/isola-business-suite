<html lang="ru">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>ISOLA Business Suite</title>
<style>
/* ══════════════════════════════════════════════════
   🍎 iOS SAFARI AGENT  |  🤖 ANDROID AGENT
   🪟 WINDOWS AGENT     |  🍏 macOS AGENT
   📱 SAMSUNG AGENT     |  🦊 FIREFOX AGENT
   🌐 OPERA AGENT       |  👑 CEO AGENT (coordinator)
   ══════════════════════════════════════════════════ */

/* ── AGENT: RESET (all platforms) ── */
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{text-decoration:none;}

/* ── CSS VARIABLES ── */
:root{
  --dk:#0f172a;--dk2:#1e293b;--dk3:#273549;--dk4:#334155;
  --ac:#3b82f6;--ac2:#2563eb;--ac-g:rgba(59,130,246,.12);
  --gr:#22c55e;--gr2:#16a34a;--gr-g:rgba(34,197,94,.12);
  --rd:#ef4444;--rd2:#dc2626;--rd-g:rgba(239,68,68,.12);
  --or:#f59e0b;--or2:#d97706;--or-g:rgba(245,158,11,.12);
  --pu:#8b5cf6;--pu-g:rgba(139,92,246,.12);
  --te:#14b8a6;--te-g:rgba(20,184,166,.12);
  --bg:#f0f4f8;--wh:#fff;--bd:#e2e8f0;--tx:#1e293b;--mu:#64748b;--lt:#f8fafc;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --sb:220px;--nav:50px;
}

/* ── LOGIN ── */
.lw{min-height:100vh;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;background:-webkit-linear-gradient(135deg,#0f172a,#1e3a5f 50%,#0f172a);background:linear-gradient(135deg,#0f172a,#1e3a5f 50%,#0f172a);padding:20px;padding-top:calc(20px + var(--safe-t));}
.lc{background:#fff;border-radius:18px;padding:28px;width:420px;max-width:100%;-webkit-box-shadow:0 28px 72px rgba(0,0,0,.3);box-shadow:0 28px 72px rgba(0,0,0,.3);}
.ll{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;-webkit-justify-content:center;justify-content:center;margin-bottom:18px;}
.li{width:44px;height:44px;background:var(--ac);border-radius:10px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:1.3rem;-webkit-flex-shrink:0;flex-shrink:0;}
.lt{font-size:1.2rem;font-weight:800;letter-spacing:-0.5px;}
.ls{font-size:.68rem;color:var(--mu);}
.fg{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:3px;margin-bottom:9px;}
.fg label{font-size:.74rem;font-weight:600;color:var(--dk3);}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--bd);border-radius:8px;padding:8px 11px;font-size:.85rem;background:#fff;outline:none;width:100%;color:var(--tx);-webkit-appearance:none;appearance:none;}
.fg input:focus,.fg select:focus{border-color:var(--ac);-webkit-box-shadow:0 0 0 3px var(--ac-g);box-shadow:0 0 0 3px var(--ac-g);}
.dg{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:4px;margin-top:8px;}
.db{padding:6px 8px;border:1px solid var(--bd);border-radius:7px;cursor:pointer;font-size:.7rem;text-align:center;background:var(--lt);-webkit-flex:1;flex:1;min-width:80px;-webkit-transition:.15s;transition:.15s;line-height:1.4;}
.db:hover{border-color:var(--ac);background:#eff6ff;color:var(--ac2);}
.dr{font-size:.62rem;color:var(--mu);margin-top:1px;}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:8px;border:none;font-size:.8rem;font-weight:500;cursor:pointer;-webkit-transition:.15s;transition:.15s;display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;gap:5px;line-height:1;}
.bp{background:var(--ac);color:#fff;}.bp:active{background:var(--ac2);}
.bs{background:var(--lt);color:var(--dk3);border:1px solid var(--bd);}.bs:active{background:var(--bd);}
.bd{background:var(--rd-g);color:var(--rd2);border:none;}
.bg0{background:none;border:none;color:var(--mu);}.bg0:active{background:var(--lt);}
.bsm{padding:3px 8px;font-size:.72rem;}
.bic{width:28px;height:28px;padding:0;-webkit-justify-content:center;justify-content:center;border-radius:6px;}
.bfull{width:100%;-webkit-justify-content:center;justify-content:center;padding:10px;font-size:.86rem;}

/* ── APP SHELL ── */
.shell{display:-webkit-flex;display:flex;min-height:100vh;}
.side{width:var(--sb);background:var(--dk);display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-flex-shrink:0;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;-webkit-transform:translateX(0);transform:translateX(0);-webkit-transition:-webkit-transform .25s;transition:transform .25s;}
.side.closed{-webkit-transform:translateX(-100%);transform:translateX(-100%);}
.slg{padding:13px 16px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:9px;border-bottom:1px solid var(--dk4);}
.slgi{width:30px;height:30px;background:var(--ac);border-radius:7px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:.9rem;-webkit-flex-shrink:0;flex-shrink:0;}
.slgt{font-weight:800;font-size:.88rem;color:#fff;letter-spacing:-.4px;}
.slgs{font-size:.58rem;color:#475569;margin-top:1px;}
nav{-webkit-flex:1;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 0;}
.ng{padding:6px 13px 2px;font-size:.58rem;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.12em;}
.ni{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;padding:7px 13px;color:#94a3b8;cursor:pointer;-webkit-transition:.12s;transition:.12s;border-left:3px solid transparent;font-size:.79rem;}
.ni:active{background:var(--dk4);}
.ni.on{background:var(--dk3);color:#fff;border-left-color:var(--ac);}
.nic{width:15px;text-align:center;font-size:.86rem;-webkit-flex-shrink:0;flex-shrink:0;}
.sft{padding:10px 13px;border-top:1px solid var(--dk4);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;-webkit-flex-shrink:0;flex-shrink:0;}
.av{width:28px;height:28px;border-radius:50%;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-weight:700;font-size:.65rem;-webkit-flex-shrink:0;flex-shrink:0;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.sn{font-size:.73rem;color:#e2e8f0;font-weight:500;line-height:1.3;}
.sr{font-size:.6rem;color:#475569;}
.lo{margin-left:auto;background:none;border:none;color:#475569;cursor:pointer;font-size:.7rem;padding:3px 7px;border-radius:4px;}
.lo:active{background:var(--dk4);}

/* ── BODY / TOPBAR ── */
.body{-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;overflow:hidden;margin-left:var(--sb);}
.top{height:var(--nav);background:#fff;border-bottom:1px solid var(--bd);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;padding:0 18px;gap:10px;-webkit-flex-shrink:0;flex-shrink:0;position:-webkit-sticky;position:sticky;top:0;z-index:50;}
.ttl{font-weight:600;font-size:.86rem;-webkit-flex:1;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tdt{font-size:.72rem;color:var(--mu);white-space:nowrap;}
.mb{display:none;background:none;border:none;font-size:1.2rem;color:var(--dk3);padding:4px 6px;}
.pg{-webkit-flex:1;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}

/* ── GRID / KPI ── */
.kg{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.kc{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid var(--bd);-webkit-flex:1;flex:1;min-width:140px;}
.kl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);margin-bottom:4px;}
.kv{font-size:1.25rem;font-weight:700;line-height:1;margin-bottom:2px;}
.ks{font-size:.66rem;color:var(--mu);}
.kc.bl .kv{color:var(--ac2);}.kc.gn .kv{color:var(--gr2);}.kc.or .kv{color:var(--or2);}.kc.rd .kv{color:var(--rd2);}.kc.pu .kv{color:var(--pu);}.kc.te .kv{color:var(--te);}

/* ── CARDS ── */
.cc{background:#fff;border-radius:10px;padding:13px 14px;border:1px solid var(--bd);margin-bottom:13px;}
.ch{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center;margin-bottom:10px;}
.ct{font-weight:600;font-size:.82rem;}
.bars{display:-webkit-flex;display:flex;-webkit-align-items:flex-end;align-items:flex-end;gap:5px;height:80px;}
.bc{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-flex:1;flex:1;}
.brs{display:-webkit-flex;display:flex;-webkit-align-items:flex-end;align-items:flex-end;gap:2px;height:70px;width:100%;}
.br{border-radius:3px 3px 0 0;width:100%;min-height:3px;}
.bl2{font-size:.58rem;color:var(--mu);margin-top:3px;text-align:center;}

/* ── TABLE ── */
.tc{background:#fff;border-radius:10px;border:1px solid var(--bd);overflow:hidden;margin-bottom:12px;}
.th{padding:10px 13px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;border-bottom:1px solid var(--bd);}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;}
th{padding:6px 10px;text-align:left;font-size:.6rem;font-weight:700;color:var(--mu);background:var(--lt);border-bottom:1px solid var(--bd);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:.78rem;color:var(--tx);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:active td{background:#fafbfc;}
.er td{text-align:center;color:var(--mu);padding:18px;}

/* ── BADGES ── */
.bdg{display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:600;}
.bg-g{background:#dcfce7;color:#15803d;}.bg-b{background:#dbeafe;color:#1d4ed8;}.bg-o{background:#fef3c7;color:#d97706;}.bg-r{background:#fee2e2;color:#dc2626;}.bg-gr{background:#f1f5f9;color:#475569;}.bg-p{background:#f3e8ff;color:#7c3aed;}.bg-pi{background:#fce7f3;color:#be185d;}.bg-te{background:#e0fdf4;color:#047857;}

/* ── MISC ── */
.ph{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;margin-bottom:12px;}
.pt{font-size:.96rem;font-weight:700;}
.prg{height:5px;background:var(--lt);border-radius:3px;overflow:hidden;}
.pf{height:100%;background:var(--ac);border-radius:3px;-webkit-transition:width .3s;transition:width .3s;}
.ap{color:var(--gr2);font-weight:600;}.an{color:var(--rd2);font-weight:600;}
.row{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:.81rem;}
.row:last-child{border-bottom:none;}
.rowb{font-weight:700;border-top:2px solid var(--bd);padding-top:8px;margin-top:2px;}
.bsec{background:#fff;border-radius:10px;border:1px solid var(--bd);padding:13px;margin-bottom:11px;}
.bsec h3{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
.tabs{display:-webkit-flex;display:flex;gap:2px;background:var(--lt);border-radius:7px;padding:3px;margin-bottom:12px;border:1px solid var(--bd);}
.tab{-webkit-flex:1;flex:1;text-align:center;padding:5px;border-radius:5px;cursor:pointer;font-size:.75rem;font-weight:500;color:var(--mu);-webkit-transition:.12s;transition:.12s;}
.tab.on{background:#fff;color:var(--tx);font-weight:600;-webkit-box-shadow:0 1px 4px rgba(0,0,0,.08);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.bk{display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;gap:4px;font-size:.76rem;color:var(--mu);cursor:pointer;padding:4px 8px;border-radius:6px;-webkit-transition:.12s;transition:.12s;border:none;background:none;margin-bottom:10px;}
.bk:active{background:var(--lt);}
.prow{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.prb{padding:4px 12px;border-radius:20px;font-size:.74rem;font-weight:500;border:1px solid var(--bd);background:var(--lt);color:var(--mu);cursor:pointer;-webkit-transition:.12s;transition:.12s;}
.prb.on{background:var(--ac);color:#fff;border-color:var(--ac);}
.srch{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:7px 11px;font-size:.82rem;background:#fff;outline:none;margin-bottom:10px;-webkit-appearance:none;appearance:none;}
.srch:focus{border-color:var(--ac);}
.srow{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.sfl{border:1.5px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:.78rem;background:#fff;outline:none;-webkit-appearance:none;appearance:none;}
.sfl:focus{border-color:var(--ac);}
.g2{display:-webkit-flex;display:flex;gap:10px;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.g2 > *{-webkit-flex:1;flex:1;min-width:180px;}
.g3{display:-webkit-flex;display:flex;gap:10px;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.g3 > *{-webkit-flex:1;flex:1;min-width:140px;}
.g4{display:-webkit-flex;display:flex;gap:10px;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.g4 > *{-webkit-flex:1;flex:1;min-width:120px;}

/* ── MODAL ── */
.mov{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:14px;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);}
.modal{background:#fff;border-radius:13px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;-webkit-box-shadow:0 24px 64px rgba(0,0,0,.22);box-shadow:0 24px 64px rgba(0,0,0,.22);}
.mh{padding:13px 16px 10px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;border-bottom:1px solid var(--bd);}
.mt{font-weight:700;font-size:.88rem;}
.mb2{padding:14px 16px;}
.mf{padding:10px 16px;border-top:1px solid var(--bd);display:-webkit-flex;display:flex;gap:7px;-webkit-justify-content:flex-end;justify-content:flex-end;}

/* ── TOASTS ── */
.toasts{position:fixed;bottom:16px;right:16px;z-index:300;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:5px;pointer-events:none;max-width:300px;}
.toast{padding:8px 13px;border-radius:8px;font-size:.78rem;font-weight:500;color:#fff;-webkit-box-shadow:0 6px 20px rgba(0,0,0,.18);box-shadow:0 6px 20px rgba(0,0,0,.18);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:6px;pointer-events:all;}
@-webkit-keyframes tin{from{opacity:0;-webkit-transform:translateX(10px);transform:translateX(10px)}to{opacity:1;-webkit-transform:none;transform:none}}
@keyframes tin{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
.toast{-webkit-animation:tin .18s ease;animation:tin .18s ease;}
.ts{background:#16a34a;}.te2{background:#dc2626;}.ti{background:#2563eb;}

/* ── CEO PANEL ── */
.ceo{background:-webkit-linear-gradient(135deg,#0f172a,#1e3a5f);background:linear-gradient(135deg,#0f172a,#1e3a5f);border-radius:13px;padding:18px;margin-bottom:14px;color:#fff;border:1px solid #334155;}
.ceo-h{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:11px;margin-bottom:14px;}
.ceo-av{width:46px;height:46px;border-radius:11px;background:var(--or);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:1.3rem;-webkit-flex-shrink:0;flex-shrink:0;}
.ceo-t{font-size:.96rem;font-weight:700;}
.ceo-s{font-size:.72rem;color:#94a3b8;margin-top:2px;}
.ceo-idea{background:rgba(255,255,255,.07);border-radius:9px;padding:10px 12px;margin-bottom:7px;border-left:3px solid var(--or);font-size:.79rem;color:#cbd5e1;line-height:1.6;}
.ceo-idea b{color:#fff;}
.agents{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:8px;margin-top:13px;}
.agent{background:rgba(255,255,255,.06);border-radius:9px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,.08);-webkit-flex:1;flex:1;min-width:80px;}
.agi{font-size:1.2rem;margin-bottom:4px;}
.agn{font-size:.68rem;font-weight:700;color:#e2e8f0;}
.ags{font-size:.62rem;color:#4ade80;margin-top:2px;}

/* ── SALARY HERO ── */
.sh{background:-webkit-linear-gradient(135deg,#0f172a,#273549);background:linear-gradient(135deg,#0f172a,#273549);border-radius:13px;padding:18px;margin-bottom:13px;color:#fff;border:1px solid var(--dk4);}
.shl{font-size:.6rem;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.shv{font-size:2rem;font-weight:700;color:#4ade80;letter-spacing:-1px;}
.shs{font-size:.72rem;color:#64748b;margin-top:3px;}
.shg{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:7px;margin-top:12px;}
.shc{border-radius:9px;padding:9px 11px;-webkit-flex:1;flex:1;min-width:80px;}
.shcl{font-size:.6rem;opacity:.7;margin-bottom:2px;}
.shcv{font-size:.84rem;font-weight:700;}

/* ── CRM ── */
.deal{background:#fff;border-radius:10px;border:1px solid var(--bd);padding:12px;margin-bottom:9px;}
.deal-t{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:flex-start;align-items:flex-start;gap:8px;margin-bottom:6px;}
.deal-cl{font-size:.86rem;font-weight:600;}
.deal-d{font-size:.74rem;color:var(--mu);margin-top:2px;}
.deal-a{font-size:.94rem;font-weight:700;color:var(--gr2);white-space:nowrap;}
.deal-m{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:6px;-webkit-align-items:center;align-items:center;}
.deal-acts{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:5px;margin-top:9px;}
.dsb{padding:4px 11px;border-radius:20px;font-size:.71rem;font-weight:500;border:1px solid var(--bd);background:var(--lt);color:var(--mu);cursor:pointer;-webkit-transition:.12s;transition:.12s;}
.dsb.won{background:var(--gr-g);color:var(--gr2);}
.dsb.lost{background:var(--rd-g);color:var(--rd2);}

/* ── PROFILE ── */
.pcard{background:#fff;border-radius:13px;padding:18px;border:1px solid var(--bd);display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:16px;-webkit-align-items:flex-start;align-items:flex-start;margin-bottom:13px;}
.pav{width:68px;height:68px;border-radius:50%;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:1.4rem;font-weight:700;color:#fff;-webkit-flex-shrink:0;flex-shrink:0;border:3px solid var(--bd);overflow:hidden;cursor:pointer;position:relative;}
.pav img{width:100%;height:100%;object-fit:cover;}

function getRate(d){
  var r=null,best='';
  for(var i=0;i<DB.rates.length;i++){
    if(DB.rates[i].date<=d && DB.rates[i].date>=best){best=DB.rates[i].date;r=DB.rates[i].rate;}
  }
  return r||12850;
}
function inits(n){ return (n||'?').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase(); }
function cpGet(id){ for(var i=0;i<DB.cps.length;i++) if(DB.cps[i].id===id) return DB.cps[i]; return null; }
function userGet(id){ for(var i=0;i<DB.users.length;i++) if(DB.users[i].id===id) return DB.users[i]; return null; }
function itemGet(id){ for(var i=0;i<ITEMS.length;i++) if(ITEMS[i].id===id) return ITEMS[i]; return null; }
function ordGet(id){ for(var i=0;i<DB.orders.length;i++) if(DB.orders[i].id===id) return DB.orders[i]; return null; }
function smt(arr,type){ var s=0; for(var i=0;i<arr.length;i++) if(arr[i].type===type) s+=arr[i].amt; return s; }
function balances(){
  var cash=0,bank=0,card=0;
  for(var i=0;i<DB.txs.length;i++){
    var t=DB.txs[i], v=t.type==='income'?t.uzs:-t.uzs;
    if(t.acc==='cash') cash+=v;
    else if(t.acc==='bank') bank+=v;
    else if(t.acc==='card') card+=v;
  }
  return {cash:cash,bank:bank,card:card,total:cash+bank+card};
}
function plMonth(y,m){
  var rng=mRng(y,m),fd=rng[0],ld=rng[1];
  var cls=[]; for(var i=0;i<DB.orders.length;i++){var o=DB.orders[i];if(o.status==='closed'&&o.closed>=fd&&o.closed<=ld) cls.push(o);}
  var rev=0; for(var i=0;i<cls.length;i++) rev+=cls[i].uzs;
  var dir=0; for(var i=0;i<DB.txs.length;i++){var t=DB.txs[i];if(t.type==='expense'&&t.oid){for(var j=0;j<cls.length;j++) if(cls[j].id===t.oid){dir+=t.uzs;break;}}}
  var gen=0,sal=0,off=0,bnk=0;
  for(var i=0;i<DB.txs.length;i++){
    var t=DB.txs[i];
    if(t.type==='expense'&&!t.oid&&t.date>=fd&&t.date<=ld){
      gen+=t.uzs;
      var it=itemGet(t.iid);
      if(it){if(it.sub==='salary') sal+=t.uzs;else if(it.sub==='office') off+=t.uzs;else if(it.sub==='bank') bnk+=t.uzs;}
    }
  }
  return {y:y,m:m,rev:rev,dir:dir,gen:gen,sal:sal,off:off,bnk:bnk,gross:rev-dir,net:rev-dir-gen};
}
function debtCP(cid){ var s=0; for(var i=0;i<DB.txs.length;i++){var t=DB.txs[i];if(t.debt&&t.cpid===cid&&t.type==='expense') s+=t.uzs;} return s; }
function ageStr(dob){
  if(!dob) return '?';
  var p=dob.split('.');
  if(p.length<3) return '?';
  var bd=new Date(+p[2],+p[1]-1,+p[0]),now=new Date();
  var age=now.getFullYear()-bd.getFullYear();
  if(now<new Date(now.getFullYear(),bd.getMonth(),bd.getDate())) age--;
  return isNaN(age)?'?':age;
}
function tenStr(sd){
  if(!sd) return '—';
  var d=new Date(sd),now=new Date();
  if(isNaN(d.getTime())) return '—';
  var y=now.getFullYear()-d.getFullYear(),mo=now.getMonth()-d.getMonth();
  if(mo<0){y--;mo+=12;}
  if(y>0&&mo>0) return y+'г. '+mo+'мес.';
  if(y>0) return y+'г.';
  return mo+'мес.';
}
function itemsFor(role){
  var res=[];
  for(var i=0;i<ITEMS.length;i++){
    var it=ITEMS[i];
    if(it.who==='all'||it.who===role||role==='director'||role==='accountant') res.push(it);
  }
  return res;
}
// 🔗 INTEGRATOR: win deal → create order + accrue commission
function accrueComm(ord,type){
  if(!ord.mid) return;
  var iid=type==='advance'?23:24;
  var amt=Math.round(ord.uzs*0.01);
  if(type==='advance'&&ord.ca) return;
  if(type==='close'&&ord.cc) return;
  DB.txs.push({id:nid(DB.txs),date:today(),type:'expense',acc:'bank',iid:iid,cpid:null,oid:ord.id,amt:amt,cur:'UZS',rate:1,uzs:amt,note:'Комиссия 1% '+(type==='advance'?'аванс':'закрытие'),by:1,debt:false});
  if(type==='advance') ord.ca=true; else ord.cc=true;
  var emp=userGet(ord.mid);
  if(emp){
    var r=emp.comm||5,c=Math.round(ord.uzs*r/100);
    DB.accruals.push({id:nid(DB.accruals),eid:emp.id,type:'commission',amt:c,note:'Комиссия '+r+'% — заказ "'+ord.title+'"',date:today(),mo:new Date().getMonth(),yr:new Date().getFullYear()});
  }
}

// ── TOASTS ──
function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast '+(type==='error'?'te2':type==='success'?'ts':'ti');
  el.innerHTML='<span>'+(type==='error'?'✕':type==='success'?'✓':'ℹ')+'</span><span>'+msg+'</span>';
  document.getElementById('toasts').appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='.2s';setTimeout(function(){if(el.parentNode) el.parentNode.removeChild(el);},220);},2800);
}

// ══════════════════════════════════════════════════════
function pgMargin(){
  var now=new Date(),rng=mRng(now.getFullYear(),now.getMonth()+1);
  var genExp=0; for(var i=0;i<DB.txs.length;i++){var t=DB.txs[i];if(t.type==='expense'&&!t.oid&&t.date>=rng[0]&&t.date<=rng[1]) genExp+=t.uzs;}
  var actBase=0; for(var i=0;i<DB.orders.length;i++) if(DB.orders[i].status==='active') actBase+=DB.orders[i].uzs;
  var rows='';
  for(var i=0;i<DB.orders.length;i++){
    var o=DB.orders[i];
    if(o.status==='cancelled') continue;
    var dir=0,inc=0;
    for(var j=0;j<DB.txs.length;j++){var t=DB.txs[j];if(t.oid===o.id){if(t.type==='expense') dir+=t.uzs;else inc+=t.uzs;}}
    var alloc=actBase>0&&o.status==='active'?genExp*o.uzs/actBase:0;
    var net=o.uzs-dir-alloc,pct=o.uzs>0?net/o.uzs*100:0;
    var cp=cpGet(o.cid),mn=userGet(o.mid);

function updDeal(id,status){
  var d=null; for(var i=0;i<DB.deals.length;i++) if(DB.deals[i].id===id){d=DB.deals[i];break;}
  if(!d) return;
  var old=d.st; d.st=status;
  if(status==='won'&&old!=='won'){
    var emp=userGet(d.eid);
    if(!d.oid){
      var cpId=null; for(var i=0;i<DB.cps.length;i++) if(DB.cps[i].n===d.cl){cpId=DB.cps[i].id;break;}
      var newOrd={id:nid(DB.orders),title:d.cl+(d.ds?' — '+d.ds:''),cid:cpId||1,uzs:d.amt,usd:Math.round(d.amt/getRate(today())),status:'active',created:today(),closed:null,note:'Из CRM',mid:d.eid,ca:false,cc:false,did:d.id};
      DB.orders.push(newOrd);d.oid=newOrd.id;
    }
    if(emp&&emp.dept==='sales'){
      var r=emp.comm||5,c=Math.round(d.amt*r/100);
      DB.accruals.push({id:nid(DB.accruals),eid:emp.id,type:'commission',amt:c,note:'Комиссия '+r+'% — '+d.cl,date:today(),mo:d.mo,yr:d.yr});
    }
    toast('🎉 Сделка выиграна! Заказ создан.','success');
  } else toast('Статус обновлён','success');
  saveDB();rp();
}
